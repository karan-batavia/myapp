[server]
headless = true
address = "0.0.0.0"
port = 5000
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 1000
enableStaticServing = true
fileWatcherType = "none"

[browser]
gatherUsageStats = false
serverAddress = "dataguardianpro.nl"
serverPort = 443

[theme]
primaryColor = "#4267B2"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F5"
textColor = "#1E293B"
font = "sans serif"

[global]
developmentMode = false
showWarningOnDirectExecution = false

[logger]
level = "warning"

[runner]
fastReruns = true
magicEnabled = true

[client]
showErrorDetails = true
toolbarMode = "minimal"
showSidebarNavigation = false
