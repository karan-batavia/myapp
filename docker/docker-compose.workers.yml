version: '3.8'

services:
  scanner-worker-general:
    image: ${DOCKER_WORKER_IMAGE:-dataguardian-worker}:${APP_VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WORKER_TYPE=general
    restart: unless-stopped
    deploy:
      replicas: ${GENERAL_WORKER_REPLICAS:-4}
      resources:
        limits:
          memory: 1G
          cpus: '1'
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r=redis.from_url('${REDIS_URL}'); r.ping()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - dataguardian-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  scanner-worker-heavy:
    image: ${DOCKER_WORKER_IMAGE:-dataguardian-worker}:${APP_VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WORKER_TYPE=heavy
    restart: unless-stopped
    deploy:
      replicas: ${HEAVY_WORKER_REPLICAS:-2}
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r=redis.from_url('${REDIS_URL}'); r.ping()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - dataguardian-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  dataguardian-network:
    external: true
