name: CI/CD Pipeline - GitHub → Docker Hub → External Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/myapp:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest
          cache-to: type=inline
      
      - name: Image successfully pushed
        run: |
          echo "✅ Docker image pushed to Docker Hub"
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest"
          echo "Tag: ${{ github.sha }}"

  deploy:
    name: Deploy to External Server
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://45.81.35.202
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "=============================================="
            echo "🚀 Starting Deployment"
            echo "=============================================="
            
            # Navigate to app directory
            echo "📁 Navigating to app directory..."
            cd ${{ secrets.APP_DIR }}
            
            # Create Docker network if not exists
            echo "🔗 Setting up Docker network..."
            docker network create dataguardian-net 2>/dev/null || echo "Network already exists"
            
            # Start Redis container if not running
            echo "📦 Ensuring Redis is running..."
            if ! docker ps | grep -q redis-cache; then
              echo "Starting Redis container..."
              docker stop redis-cache 2>/dev/null || true
              docker rm redis-cache 2>/dev/null || true
              docker run -d \
                --name redis-cache \
                --network dataguardian-net \
                --restart unless-stopped \
                -v redis-data:/data \
                redis:7-alpine redis-server --appendonly yes
              echo "✅ Redis container started"
            else
              echo "✅ Redis already running"
            fi
            
            # Pull latest Docker image from Docker Hub
            echo "📥 Pulling latest image from Docker Hub..."
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest
            
            if [ $? -ne 0 ]; then
              echo "❌ Failed to pull Docker image"
              exit 1
            fi
            
            # Stop existing container
            echo "🛑 Stopping existing container..."
            docker stop myapp 2>/dev/null || echo "No container named 'myapp' running"
            docker rm myapp 2>/dev/null || echo "No container named 'myapp' to remove"
            
            # Run new container with Redis connection
            echo "🚀 Starting new container..."
            docker run -d \
              --name myapp \
              --network dataguardian-net \
              --restart unless-stopped \
              -p 5000:5000 \
              -v ${{ secrets.APP_DIR }}:/data \
              -e ENVIRONMENT=production \
              -e PYTHONUNBUFFERED=1 \
              -e REDIS_URL="redis://redis-cache:6379/0" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e DATAGUARDIAN_MASTER_KEY="${{ secrets.DATAGUARDIAN_MASTER_KEY }}" \
              -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              -e STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
              -e STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e DISABLE_RLS=true \
              ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest
            
            # Start Webhook Server container
            echo "📦 Starting Webhook Server..."
            docker stop webhook-server 2>/dev/null || true
            docker rm webhook-server 2>/dev/null || true
            docker run -d \
              --name webhook-server \
              --network dataguardian-net \
              --restart unless-stopped \
              -p 5001:5001 \
              -e ENVIRONMENT=production \
              -e PYTHONUNBUFFERED=1 \
              -e REDIS_URL="redis://redis-cache:6379/0" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
              -e STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest \
              python services/webhook_server.py
            
            echo "✅ Webhook server started on port 5001"
            
            # Update nginx config for webhook routing (base64 encoded to avoid YAML issues)
            # This config includes sites-enabled to preserve SSL config
            echo "🔧 Updating nginx configuration..."
            echo "" | base64 -d > /tmp/nginx.conf
            sudo cp /tmp/nginx.conf /etc/nginx/nginx.conf
            
            # Update HTTPS site config - add webhook if missing
            if [ -f /etc/nginx/sites-available/dataguardianpro.nl ] && ! grep -q "location /webhook/" /etc/nginx/sites-available/dataguardianpro.nl; then
              echo "🔧 Adding webhook to HTTPS config..."
              sudo sed -i 's|location / {|location /webhook/ { proxy_pass http://127.0.0.1:5001; proxy_buffering off; }\n    location / {|' /etc/nginx/sites-available/dataguardianpro.nl
              echo "✅ Webhook added"
            fi
            
            sudo nginx -t && sudo systemctl reload nginx
            echo "✅ Nginx configuration updated"
            
            # Verify webhook server is accessible
            echo "🔍 Testing webhook endpoint..."
            sleep 3
            if curl -s http://localhost:5001/webhook/health | grep -q "healthy"; then
              echo "✅ Webhook server is healthy"
            else
              echo "⚠️ Webhook server health check failed"
              docker logs webhook-server --tail=10
            fi
            
            if [ $? -ne 0 ]; then
              echo "❌ Failed to start container"
              docker logs myapp 2>/dev/null
              exit 1
            fi
            
            # Wait for container to start
            echo "⏳ Waiting for container to start..."
            sleep 10
            
            # Verify container is running
            echo "✅ Verifying deployment..."
            if docker ps | grep -q myapp; then
              echo "=============================================="
              echo "✅ DEPLOYMENT SUCCESSFUL!"
              echo "=============================================="
              echo "Container Status:"
              docker ps | grep myapp
              echo ""
              echo "Recent Logs:"
              docker logs myapp --tail=20
              echo ""
              echo "Application URL: http://${{ secrets.SSH_HOST }}"
              echo "=============================================="
            else
              echo "=============================================="
              echo "❌ DEPLOYMENT FAILED!"
              echo "=============================================="
              echo "Container is not running. Logs:"
              docker logs myapp 2>/dev/null
              exit 1
            fi
            
            # Cleanup old images
            echo "🧹 Cleaning up old Docker images..."
            docker image prune -af || echo "Cleanup completed"
            
            echo "✅ Deployment complete!"
