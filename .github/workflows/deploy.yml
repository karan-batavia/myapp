name: Deploy DataGuardian Pro (Zero-Downtime)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (leave empty for commit SHA)'
        required: false
        default: ''

env:
  APP_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/dataguardian-app
  WORKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/dataguardian-worker

jobs:
  build:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.tag }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set version tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:${{ steps.version.outputs.tag }}
          cache-from: type=registry,ref=${{ env.APP_IMAGE }}:latest
          cache-to: type=inline
      
      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.worker
          push: true
          tags: |
            ${{ env.WORKER_IMAGE }}:latest
            ${{ env.WORKER_IMAGE }}:${{ steps.version.outputs.tag }}
          cache-from: type=registry,ref=${{ env.WORKER_IMAGE }}:latest
          cache-to: type=inline
      
      - name: Images pushed successfully
        run: |
          echo "App image: ${{ env.APP_IMAGE }}:${{ steps.version.outputs.tag }}"
          echo "Worker image: ${{ env.WORKER_IMAGE }}:${{ steps.version.outputs.tag }}"

  deploy:
    name: Deploy to External Server
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://45.81.35.202
    
    steps:
      - name: Deploy to Hetzner (Blue-Green)
        uses: appleboy/ssh-action@v1.0.0
        env:
          VERSION: ${{ needs.build.outputs.version }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          envs: VERSION
          script: |
            set -e
            
            echo "=============================================="
            echo "DataGuardian Pro - Zero-Downtime Deployment"
            echo "Version: $VERSION"
            echo "=============================================="
            
            cd /opt/dataguardian
            
            # Ensure .env exists
            if [ ! -f ".env" ]; then
              echo "ERROR: .env file not found"
              exit 1
            fi
            
            # Set version
            export APP_VERSION=$VERSION
            sed -i "s/^APP_VERSION=.*/APP_VERSION=$VERSION/" .env
            
            # Determine current and new color
            CURRENT_PORT=$(grep "server 127.0.0.1:500" nginx/nginx-bluegreen.conf | grep -oP "500[01]" | head -1)
            if [ "$CURRENT_PORT" = "5000" ]; then
              CURRENT_COLOR="blue"
              NEW_COLOR="green"
              NEW_PORT="5001"
            else
              CURRENT_COLOR="green"
              NEW_COLOR="blue"
              NEW_PORT="5000"
            fi
            
            echo "Current: $CURRENT_COLOR, Deploying: $NEW_COLOR"
            
            # Pull new images
            echo "Pulling images..."
            docker compose -f docker-compose.prod.yml pull
            
            # Start new color
            echo "Starting $NEW_COLOR..."
            if [ "$NEW_COLOR" = "green" ]; then
              docker compose -f docker-compose.prod.yml --profile green up -d app-green
            else
              docker compose -f docker-compose.prod.yml up -d app-blue
            fi
            
            # Wait for health
            echo "Waiting for $NEW_COLOR to be healthy..."
            for i in {1..30}; do
              if curl -sf "http://localhost:$NEW_PORT/_stcore/health" > /dev/null 2>&1; then
                echo "$NEW_COLOR is healthy!"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "ERROR: $NEW_COLOR failed health check"
                docker compose -f docker-compose.prod.yml stop "app-$NEW_COLOR"
                exit 1
              fi
              sleep 2
            done
            
            # Switch traffic
            echo "Switching traffic to $NEW_COLOR..."
            sed -i "s/server 127.0.0.1:500[01];/server 127.0.0.1:$NEW_PORT;/" nginx/nginx-bluegreen.conf
            docker exec dataguardian-nginx nginx -s reload
            
            # Verify production health
            sleep 3
            if curl -sf "https://dataguardianpro.nl/health" > /dev/null 2>&1; then
              echo "Production health check PASSED"
            else
              echo "WARNING: Production health check failed"
            fi
            
            # Stop old color
            echo "Stopping $CURRENT_COLOR..."
            docker compose -f docker-compose.prod.yml stop "app-$CURRENT_COLOR" || true
            
            # Update workers
            echo "Updating scanner workers..."
            docker compose -f docker-compose.prod.yml up -d scanner-worker
            
            # Cleanup old images (keep last 3)
            echo "Cleaning up old images..."
            docker image prune -f --filter "until=72h" || true
            
            echo "=============================================="
            echo "DEPLOYMENT SUCCESSFUL"
            echo "=============================================="
            echo "Active: $NEW_COLOR (port $NEW_PORT)"
            echo "Version: $VERSION"
            echo ""
            docker compose -f docker-compose.prod.yml ps
            echo ""
            echo "Rollback: ./scripts/rollback.sh"
            echo "=============================================="
