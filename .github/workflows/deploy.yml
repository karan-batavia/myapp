name: CI/CD Pipeline - GitHub → Docker Hub → External Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/myapp:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest
          cache-to: type=inline
      
      - name: Image successfully pushed
        run: |
          echo "✅ Docker image pushed to Docker Hub"
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest"
          echo "Tag: ${{ github.sha }}"

  deploy:
    name: Deploy to External Server
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://45.81.35.202
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "=============================================="
            echo "🚀 Starting Deployment"
            echo "=============================================="
            
            # Navigate to app directory
            echo "📁 Navigating to app directory..."
            cd ${{ secrets.APP_DIR }}
            
            # Create Docker network if not exists
            echo "🔗 Setting up Docker network..."
            docker network create dataguardian-net 2>/dev/null || echo "Network already exists"
            
            # Ensure dataguardian-redis is on the network
            echo "📦 Ensuring Redis is connected to network..."
            if docker ps | grep -q dataguardian-redis; then
              docker network connect dataguardian-net dataguardian-redis 2>/dev/null || echo "Redis already on network"
              echo "✅ dataguardian-redis connected to network"
            else
              echo "Starting dataguardian-redis container..."
              docker run -d \
                --name dataguardian-redis \
                --network dataguardian-net \
                --restart unless-stopped \
                -p 6379:6379 \
                -v redis-data:/data \
                redis:7-alpine redis-server --appendonly yes
              echo "✅ dataguardian-redis started"
            fi
            
            # Pull latest Docker image from Docker Hub
            echo "📥 Pulling latest image from Docker Hub..."
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest
            
            if [ $? -ne 0 ]; then
              echo "❌ Failed to pull Docker image"
              exit 1
            fi
            
            # Stop existing container
            echo "🛑 Stopping existing container..."
            docker stop myapp 2>/dev/null || echo "No container named 'myapp' running"
            docker rm myapp 2>/dev/null || echo "No container named 'myapp' to remove"
            
            # Run new container with Redis connection
            echo "🚀 Starting new container..."
            docker run -d \
              --name myapp \
              --network dataguardian-net \
              --restart unless-stopped \
              -p 5000:5000 \
              -v ${{ secrets.APP_DIR }}:/data \
              -e ENVIRONMENT=production \
              -e PYTHONUNBUFFERED=1 \
              -e REDIS_URL="redis://dataguardian-redis:6379/0" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e DATAGUARDIAN_MASTER_KEY="${{ secrets.DATAGUARDIAN_MASTER_KEY }}" \
              -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              -e STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
              -e STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e DISABLE_RLS=true \
              ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest
            
            # Start Webhook Server container
            echo "📦 Starting Webhook Server..."
            docker stop webhook-server 2>/dev/null || true
            docker rm webhook-server 2>/dev/null || true
            docker run -d \
              --name webhook-server \
              --network dataguardian-net \
              --restart unless-stopped \
              -p 5001:5001 \
              -e ENVIRONMENT=production \
              -e PYTHONUNBUFFERED=1 \
              -e REDIS_URL="redis://dataguardian-redis:6379/0" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
              -e STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/myapp:latest \
              python services/webhook_server.py
            
            echo "✅ Webhook server started on port 5001"
            
            # Update nginx site configuration for Streamlit
            echo "Updating nginx site configuration..."
            cat > /tmp/dataguardianpro.conf << 'NGINXEOF'
server {
    listen 80;
    server_name dataguardianpro.nl www.dataguardianpro.nl;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://\$host\$request_uri; }
}
server {
    listen 443 ssl http2;
    server_name dataguardianpro.nl www.dataguardianpro.nl;
    ssl_certificate /etc/letsencrypt/live/dataguardianpro.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dataguardianpro.nl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    client_max_body_size 200M;
    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade \$http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }
    location /static {
        proxy_pass http://localhost:5000/static;
        proxy_http_version 1.1;
        proxy_set_header Host \$host;
        proxy_cache_bypass \$http_upgrade;
    }
    location /_stcore {
        proxy_pass http://localhost:5000/_stcore;
        proxy_http_version 1.1;
        proxy_set_header Upgrade \$http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host \$host;
    }
    location /webhook/ {
        proxy_pass http://localhost:5001/;
        proxy_http_version 1.1;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
    }
    location /healthz { proxy_pass http://localhost:5000/healthz; }
}
NGINXEOF
            sudo cp /tmp/dataguardianpro.conf /etc/nginx/sites-available/dataguardianpro.nl
            sudo ln -sf /etc/nginx/sites-available/dataguardianpro.nl /etc/nginx/sites-enabled/dataguardianpro.nl
            sudo nginx -t && sudo systemctl reload nginx
            echo "Nginx configuration updated"
            
            # Verify webhook server is accessible
            echo "🔍 Testing webhook endpoint..."
            sleep 3
            if curl -s http://localhost:5001/webhook/health | grep -q "healthy"; then
              echo "✅ Webhook server is healthy"
            else
              echo "⚠️ Webhook server health check failed"
              docker logs webhook-server --tail=10
            fi
            
            if [ $? -ne 0 ]; then
              echo "❌ Failed to start container"
              docker logs myapp 2>/dev/null
              exit 1
            fi
            
            # Wait for container to start
            echo "⏳ Waiting for container to start..."
            sleep 10
            
            # Verify container is running
            echo "✅ Verifying deployment..."
            if docker ps | grep -q myapp; then
              echo "=============================================="
              echo "✅ DEPLOYMENT SUCCESSFUL!"
              echo "=============================================="
              echo "Container Status:"
              docker ps | grep myapp
              echo ""
              echo "Recent Logs:"
              docker logs myapp --tail=20
              echo ""
              echo "Application URL: http://${{ secrets.SSH_HOST }}"
              echo "=============================================="
            else
              echo "=============================================="
              echo "❌ DEPLOYMENT FAILED!"
              echo "=============================================="
              echo "Container is not running. Logs:"
              docker logs myapp 2>/dev/null
              exit 1
            fi
            
            # Cleanup old images
            echo "🧹 Cleaning up old Docker images..."
            docker image prune -af || echo "Cleanup completed"
            
            echo "✅ Deployment complete!"
