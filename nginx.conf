events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/x-javascript
        application/xml+rss
        application/javascript
        application/json;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Upstream for DataGuardian Pro (Docker container on port 5000)
    upstream dataguardian_app {
        server 127.0.0.1:5000;
        keepalive 32;
    }

    # Upstream for Webhook Server (Docker container on port 5001)
    upstream webhook_server {
        server 127.0.0.1:5001;
        keepalive 8;
    }

    # Include sites-enabled for server configurations
    include /etc/nginx/sites-enabled/*;
}
